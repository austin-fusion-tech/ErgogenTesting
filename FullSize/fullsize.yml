meta:
  engine: 4.1.0
units:
  visual_x: 17
  visual_y: 16
points:
  zones:
    matrix:
      anchor:
        shift: [50, -100] # Fix KiCad placement
      columns:
        one:
          key:
            column_net: P1
            column_mark: 1
        two:
          key:
            spread: 1U
            column_net: P0
            column_mark: 2
        three:
          key:
            spread: 1U
            column_net: P14
            column_mark: 3
        four:
          key:
            spread: 1U
            column_net: P20
            column_mark: 4
        five:
          key:
            spread:  1U
            column_net: P2
            column_mark: 5
        six:
          key:
            spread:  1U
            column_net: P3
            column_mark: 6
        seven:
          key:
            spread:  1U
            column_net: P4
            column_mark: 7
          rows:
            2uspacebar:
              skip: false
              shift: [-0.5U, 1U]
              rotate: 180
            modrow:
              shift: [-0.5U, -1U]
              rotate: 180
        eight:
          key:
            spread:  1U
            column_net: P5
            column_mark: 8
        nine:
          key:
            spread:  1U
            column_net: P6
            column_mark: 9
        ten:
          key:
            spread:  1U
            column_net: P7
            column_mark: 10
        eleven:
          key:
            spread:  1U
            column_net: P8
            column_mark: 11
        twelve:
          key:
            spread:  1U
            column_net: P9
            column_mark: 12
      rows:
        2uspacebar:
          padding: 1U
          row_net: P19
          skip: true
        modrow:
          padding: 1U
          row_net: P19
        bottom:
          padding: 1U
          row_net: P18
        home:
          padding: 1U
          row_net: P15
        top:
          padding: 1U
          row_net: P21
  key:
    bind: 2
outlines:
  _raw:
    - what: rectangle
      where: true
      asym: left
      size: [1U,1U]
  panel:
    - what: outline
      name: _raw
      expand: 1.6
  _switch_cutouts:
    - what: rectangle
      where: true
      asym: left
      size: 14
      bound: false
  switch_plate:
    main:
      what: outline
      name: panel
    keyholes:
      what: outline
      name: _switch_cutouts
      operation: subtract
pcbs:
  plank:
    template: kicad8
    outlines:
      main:
        outline: panel
    footprints:
      choc:
        what: ceoloide/switch_choc_v1_v2
        where: true
        params:
          from: "{{colrow}}"
          to: "{{column_net}}"
          include_keycap: true

          choc_v1_support: false
          choc_v2_support: true
          solder: true
          hotswap: false
      diode:
        what: ceoloide/diode_tht_sod123
        where: true
        adjust:
          rotate: 0
          shift: [ 0, -4.5 ]
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
      promicro:
        what: ceoloide/mcu_nice_nano
        where:
          ref: matrix_seven_top
          shift: [-0.5cx, 1]
          rotate: 90
        params:
          reverse_mount: true    
      jlcpcb_order_number_text:
        what: ceoloide/utility_text
        where: matrix_seven_2uspacebar
        params:
          text: goofygraber
          reversible: true
        adjust:
          shift: [0,-u/2]
